<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Registrati — Container Loading Planner</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/styles/site.css">
</head>
<body>

<div class="authWrap">
  <div class="authCard">
    <a href="/" class="brand">
      <svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="36" height="36" rx="9" fill="#0f172a"/>
        <rect x="9"  y="22" width="8" height="9"  rx="1" fill="#fbbf24"/>
        <rect x="18" y="16" width="8" height="15" rx="1" fill="#fbbf24"/>
        <rect x="27" y="10" width="8" height="21" rx="1" fill="#fbbf24" opacity="0.55"/>
      </svg>
      <span>Container Loading Planner</span>
    </a>

    <h1>Crea il tuo account</h1>
    <p class="sub">Gratis per sempre. Nessuna carta richiesta.</p>

    <div id="msg"></div>

    <form id="signupForm">
      <div class="field">
        <label for="email">Email aziendale</label>
        <input id="email" type="email" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" required minlength="8" autocomplete="new-password">
      </div>
      <button type="submit" class="btn primary" id="submitBtn">Registrati gratis</button>
    </form>

    <p class="authAlt">
      Hai già un account? <a href="/login.html">Accedi</a>
    </p>
    <p class="authAlt" style="margin-top:14px;font-size:11px">
      Registrandoti accetti i nostri <a href="/terms.html">Termini</a> e la <a href="/privacy.html">Privacy</a>.
    </p>
  </div>
</div>

<script type="module">
import { supabase, currentUser } from "/lib/auth.js";

const u = await currentUser();
if (u) location.href = "/dashboard.html";

const form = document.getElementById("signupForm");
const msg  = document.getElementById("msg");
const btn  = document.getElementById("submitBtn");

function showMsg(text, kind="error") {
  msg.innerHTML = `<div class="authMessage ${kind}">${text}</div>`;
}

form.addEventListener("submit", async e => {
  e.preventDefault();
  btn.disabled = true; btn.textContent = "Registrazione in corso…";
  msg.innerHTML = "";
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  if (password.length < 8) {
    showMsg("La password deve essere di almeno 8 caratteri.");
    btn.disabled = false; btn.textContent = "Registrati gratis";
    return;
  }
  const { data, error } = await supabase.auth.signUp({
    email, password,
    options: { emailRedirectTo: location.origin + "/dashboard.html" }
  });
  if (error) {
    showMsg("Errore: " + error.message);
    btn.disabled = false; btn.textContent = "Registrati gratis";
    return;
  }
  if (data.user && !data.session) {
    showMsg("Ti abbiamo inviato un'email di conferma. Apri il link per attivare l'account.", "success");
    btn.style.display = "none";
  } else {
    location.href = "/dashboard.html";
  }
});
</script>
</body>
</html>
