<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Registrati — Container Loading Planner</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/styles/site.css">
</head>
<body>

<div class="authWrap">
  <div class="authCard" style="max-width:480px">
    <a href="/" class="brand">
      <svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="2" y="2" width="36" height="36" rx="6" fill="#0f172a"/>
      <rect x="7" y="11" width="26" height="18" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
      <rect x="9"  y="13" width="9"  height="6" fill="#fbbf24"/>
      <rect x="19" y="13" width="6"  height="6" fill="#fbbf24" opacity="0.85"/>
      <rect x="26" y="13" width="6"  height="6" fill="#fbbf24" opacity="0.7"/>
      <rect x="9"  y="20" width="6"  height="8" fill="#fbbf24" opacity="0.75"/>
      <rect x="16" y="20" width="9"  height="4" fill="#fbbf24" opacity="0.85"/>
      <rect x="16" y="25" width="4"  height="3" fill="#fbbf24" opacity="0.6"/>
      <rect x="21" y="25" width="4"  height="3" fill="#fbbf24" opacity="0.6"/>
      <rect x="26" y="20" width="6"  height="8" fill="#fbbf24" opacity="0.9"/>
    </svg>
      <span>Container Loading Planner</span>
    </a>

    <h1>Crea il tuo account aziendale</h1>
    <p class="sub" id="subTitle">Gratis per sempre. Nessuna carta richiesta.</p>

    <div id="msg"></div>

    <form id="signupForm">
      <div class="field">
        <label for="email">Email aziendale *</label>
        <input id="email" type="email" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Password (min 8 caratteri) *</label>
        <input id="password" type="password" required minlength="8" autocomplete="new-password">
      </div>
      <div id="companyFields">
        <div class="field">
          <label for="companyName">Nome azienda *</label>
          <input id="companyName" type="text" required>
        </div>
        <div class="field">
          <label for="country">Paese *</label>
          <select id="country" required>
            <option value="">Seleziona...</option>
            <option value="IT">Italia</option>
            <option value="ES">Spagna</option>
            <option value="FR">Francia</option>
            <option value="DE">Germania</option>
            <option value="GB">Regno Unito</option>
            <option value="US">Stati Uniti</option>
            <option value="PT">Portogallo</option>
            <option value="NL">Paesi Bassi</option>
            <option value="BE">Belgio</option>
            <option value="CH">Svizzera</option>
            <option value="AT">Austria</option>
            <option value="PL">Polonia</option>
            <option value="GR">Grecia</option>
            <option value="TR">Turchia</option>
            <option value="CN">Cina</option>
            <option value="JP">Giappone</option>
            <option value="KR">Corea del Sud</option>
            <option value="IN">India</option>
            <option value="BR">Brasile</option>
            <option value="MX">Messico</option>
            <option value="AR">Argentina</option>
            <option value="AE">Emirati Arabi Uniti</option>
            <option value="SA">Arabia Saudita</option>
            <option value="EG">Egitto</option>
            <option value="ZA">Sudafrica</option>
            <option value="AU">Australia</option>
            <option value="CA">Canada</option>
            <option value="OTHER">Altro</option>
          </select>
        </div>
      </div>
      <button type="submit" class="btn primary" id="submitBtn">Registrati gratis</button>
    </form>

    <p class="authAlt">
      Hai già un account? <a href="/login.html">Accedi</a>
    </p>
    <p class="authAlt" style="margin-top:14px;font-size:11px">
      Registrandoti accetti i nostri <a href="/terms.html">Termini</a> e la <a href="/privacy.html">Privacy</a>.
    </p>
  </div>
</div>

<script type="module">
import { supabase, currentUser } from "/lib/auth.js";

const u = await currentUser();
if (u) location.href = "/dashboard.html";

const form = document.getElementById("signupForm");
const msg  = document.getElementById("msg");
const btn  = document.getElementById("submitBtn");

// Se c'è un token invito, nasconde i campi azienda
const params = new URLSearchParams(location.search);
const inviteToken = params.get("invite");
let invitationData = null;

if (inviteToken) {
  // Recupera info dell'invito
  const { data, error } = await supabase
    .from("invitations")
    .select("id, email, company_id, accepted, expires_at, companies(name)")
    .eq("token", inviteToken)
    .single();
  if (error || !data) {
    msg.innerHTML = `<div class="authMessage error">Invito non trovato o non valido.</div>`;
  } else if (data.accepted) {
    msg.innerHTML = `<div class="authMessage error">Questo invito è già stato accettato. <a href="/login.html">Accedi</a> all'account esistente.</div>`;
  } else if (data.expires_at && new Date(data.expires_at) < new Date()) {
    msg.innerHTML = `<div class="authMessage error">Questo invito è scaduto.</div>`;
  } else {
    invitationData = data;
    document.getElementById("companyFields").style.display = "none";
    document.getElementById("companyName").required = false;
    document.getElementById("country").required = false;
    document.getElementById("email").value = data.email;
    document.getElementById("email").readOnly = true;
    document.getElementById("subTitle").innerHTML = `Sei stato invitato a unirti a <b>${escapeHtml(data.companies?.name || "un'azienda")}</b>.`;
    document.querySelector("h1").textContent = "Accetta invito";
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function showMsg(text, kind="error") {
  msg.innerHTML = `<div class="authMessage ${kind}">${text}</div>`;
}

form.addEventListener("submit", async e => {
  e.preventDefault();
  btn.disabled = true; btn.textContent = "Registrazione in corso…";
  msg.innerHTML = "";

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const companyName = document.getElementById("companyName").value.trim();
  const country = document.getElementById("country").value;

  if (password.length < 8) {
    showMsg("La password deve essere di almeno 8 caratteri.");
    btn.disabled = false; btn.textContent = "Registrati gratis";
    return;
  }

  if (!invitationData && (!companyName || !country)) {
    showMsg("Inserisci nome azienda e paese.");
    btn.disabled = false; btn.textContent = "Registrati gratis";
    return;
  }

  // Salva temporaneamente i dati azienda in localStorage per usarli dopo conferma email
  if (!invitationData) {
    localStorage.setItem("pendingCompany", JSON.stringify({ name: companyName, country }));
  } else {
    localStorage.setItem("pendingInvite", inviteToken);
  }

  const { data, error } = await supabase.auth.signUp({
    email, password,
    options: { emailRedirectTo: location.origin + "/dashboard.html" }
  });

  if (error) {
    showMsg("Errore: " + error.message);
    btn.disabled = false; btn.textContent = "Registrati gratis";
    return;
  }

  if (data.user && !data.session) {
    showMsg("Ti abbiamo inviato un'email di conferma. Apri il link per attivare l'account.", "success");
    btn.style.display = "none";
  } else {
    location.href = "/dashboard.html";
  }
});
</script>
</body>
</html>
