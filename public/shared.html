<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Piano di carico condiviso — Container Loading Planner</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/styles/site.css">
</head>
<body>
<header class="siteHeader"><div class="siteHeaderInner"><a href="/" class="brand"><span class="logoMark"><svg viewBox="0 0 40 40"><rect x="5" y="9" width="30" height="22" rx="2" fill="none" stroke="#fff" stroke-width="2"/><rect x="8" y="12" width="10" height="7" fill="#f5b301"/><rect x="20" y="12" width="6" height="7" fill="#f5b301"/><rect x="28" y="12" width="4" height="7" fill="#f5b301"/><rect x="8" y="21" width="7" height="7" fill="#f5b301"/><rect x="17" y="21" width="9" height="7" fill="#f5b301"/><rect x="28" y="21" width="4" height="7" fill="#f5b301"/></svg></span><span>Container Loading Planner<small>Shared plan</small></span></a><nav class="siteNav"><a href="/signup.html" class="btn primary alwaysVisible">Crea account</a></nav></div></header>
<main class="sharedShell"><div id="content"><div class="loadingState">Caricamento piano condiviso…</div></div></main>
<script type="module">
import { loadProjectByToken } from "/lib/auth.js";
const params = new URLSearchParams(location.search);
const token = params.get("token");
const content = document.getElementById("content");
const VEHICLES = {"20ft":{name:"20ft Container",length:5898,width:2352,height:2393,maxWeight:28280},"40ft":{name:"40ft Container",length:12032,width:2352,height:2393,maxWeight:26990},"40hc":{name:"40ft High Cube",length:12032,width:2350,height:2700,maxWeight:28600},"45hc":{name:"45ft High Cube",length:13556,width:2352,height:2700,maxWeight:27600},"truck_eu_tautliner":{name:"EU Tautliner 13.6m",length:13600,width:2480,height:2700,maxWeight:24000},"truck_eu_jumbo":{name:"EU Jumbo 13.6m",length:13600,width:2480,height:3000,maxWeight:24000},"truck_us_53ft":{name:"US 53ft trailer",length:16154,width:2591,height:2743,maxWeight:19958},"truck_solo":{name:"Solo 7.2m",length:7200,width:2450,height:2500,maxWeight:8000},"uld_ake":{name:"ULD AKE",length:1562,width:1534,height:1626,maxWeight:1588},"uld_pmc":{name:"ULD PMC",length:3175,width:2235,height:1626,maxWeight:6804},"uld_ala":{name:"ULD ALA",length:3175,width:2235,height:1626,maxWeight:4626}};
if (!token) content.innerHTML = `<div class="emptyState"><h2>Link non valido</h2><p>Manca il token di condivisione.</p></div>`;
else {
  try { const project = await loadProjectByToken(token); if (!project) content.innerHTML = `<div class="emptyState"><h2>Piano non trovato</h2><p>Il link è scaduto, revocato o non più disponibile.</p></div>`; else renderProject(project); }
  catch (e) { content.innerHTML = `<div class="emptyState"><h2>Errore</h2><p>${esc(e.message)}</p></div>`; }
}
function renderProject(project) {
  const p = project.payload || {};
  const placed = Array.isArray(p.placed) ? p.placed : [];
  const c = p.customDims && project.container_key === "custom" ? { name:"Custom", ...p.customDims } : (VEHICLES[project.container_key] || VEHICLES["40ft"]);
  const totalWeight = placed.reduce((s, it) => s + (+it.weight || 0), 0);
  const totalVol = placed.reduce((s, it) => s + ((+it.length||0)*(+it.width||0)*(+it.height||0)/1e9), 0);
  const area = placed.reduce((s, it) => s + ((+it.length||0)*(+it.width||0)), 0);
  const areaPct = c.length && c.width ? Math.round(area / (c.length*c.width) * 100) : 0;
  content.innerHTML = `<section class="sharedCard"><div class="sharedHeader"><div><span class="badge">Piano condiviso</span><h1>${esc(project.name || "Piano di carico")}</h1><p style="color:var(--muted);margin:8px 0 0">${esc(c.name)} · Aggiornato ${project.updated_at ? new Date(project.updated_at).toLocaleDateString("it-IT") : "—"}</p></div><a href="/signup.html" class="btn primary">Crea il tuo workspace</a></div><div class="sharedMetrics"><div class="sharedMetric"><span>Colli</span><b>${placed.length}</b></div><div class="sharedMetric"><span>Peso</span><b>${fmt(totalWeight)} kg</b></div><div class="sharedMetric"><span>Volume</span><b>${totalVol.toFixed(2)} m³</b></div><div class="sharedMetric"><span>Area</span><b>${areaPct}%</b></div></div>${renderSvg(c, placed)}</section><section class="sharedCard"><h2 style="margin-top:0">Distinta carico</h2><div class="simpleTableWrap"><table class="simpleTable"><thead><tr><th>#</th><th>Tipo</th><th>Descrizione</th><th>Matricola</th><th>Finezza</th><th>Cassa mm</th><th>Peso</th></tr></thead><tbody>${placed.map((it, i) => `<tr><td>${i+1}</td><td>${esc(labelType(it))}</td><td>${esc(desc(it))}</td><td>${esc(it.serial || it.matricola || "—")}</td><td>${esc(it.gauge || it.finezza || "—")}</td><td>${fmt(it.length)}×${fmt(it.width)}×${fmt(it.height)}</td><td>${fmt(it.weight)} kg</td></tr>`).join("") || `<tr><td colspan="7">Nessun collo presente.</td></tr>`}</tbody></table></div></section>`;
}
function renderSvg(c, items) { const w = 980, h = 270, pad = 26; const sx = (w-2*pad)/c.length, sy = (h-2*pad)/c.width; return `<svg class="sharedLayoutSvg" viewBox="0 0 ${w} ${h}" role="img" aria-label="Layout condiviso"><rect x="${pad}" y="${pad}" width="${c.length*sx}" height="${c.width*sy}" fill="#fff" stroke="#07111f" stroke-width="3"/><text x="${pad+8}" y="${pad+18}" font-size="12" fill="#667085">PORTA</text>${items.map((it,i) => { const x = pad+(+it.x||0)*sx, y = pad+(+it.y||0)*sy, l = ((it.rotation||0)%180===90 ? +it.width : +it.length)*sx, ww = ((it.rotation||0)%180===90 ? +it.length : +it.width)*sy; return `<rect x="${x}" y="${y}" width="${l}" height="${ww}" fill="#157f74" stroke="#0c5e55" stroke-width="2"/><text x="${x+8}" y="${y+18}" fill="#fff" font-size="12" font-weight="700">${i+1}. ${esc(desc(it)).slice(0,24)}</text>`; }).join("")}</svg>`; }
function labelType(it){ return it.category || it.type || "Collo"; }
function desc(it){ return it.description || it.model || it.name || "Collo"; }
function fmt(n){ return Number(n||0).toLocaleString("it-IT"); }
function esc(s){ return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
</script>
</body>
</html>
