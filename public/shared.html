<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Piano di carico condiviso — Container Loading Planner</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/styles/site.css">
</head>
<body>

<header class="siteHeader">
  <a href="/" class="brand">
    <svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="2" y="2" width="36" height="36" rx="6" fill="#0f172a"/>
      <rect x="7" y="11" width="26" height="18" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
      <rect x="9"  y="13" width="9"  height="6" fill="#fbbf24"/>
      <rect x="19" y="13" width="6"  height="6" fill="#fbbf24" opacity="0.85"/>
      <rect x="26" y="13" width="6"  height="6" fill="#fbbf24" opacity="0.7"/>
      <rect x="9"  y="20" width="6"  height="8" fill="#fbbf24" opacity="0.75"/>
      <rect x="16" y="20" width="9"  height="4" fill="#fbbf24" opacity="0.85"/>
      <rect x="16" y="25" width="4"  height="3" fill="#fbbf24" opacity="0.6"/>
      <rect x="21" y="25" width="4"  height="3" fill="#fbbf24" opacity="0.6"/>
      <rect x="26" y="20" width="6"  height="8" fill="#fbbf24" opacity="0.9"/>
    </svg>
    <span>Container Loading Planner</span>
  </a>
  <nav>
    <a href="/signup.html" class="btn primary">Crea il tuo account gratis</a>
  </nav>
</header>

<main style="max-width:1280px;margin:24px auto;padding:0 24px">
  <div id="content"><p>Caricamento del piano…</p></div>
</main>

<script type="module">
import { loadProjectByToken } from "/lib/auth.js";

const params = new URLSearchParams(location.search);
const token = params.get("token");
const content = document.getElementById("content");

if (!token) {
  content.innerHTML = `<div class="emptyState"><h2>Link non valido</h2><p>Manca il token di condivisione.</p></div>`;
} else {
  try {
    const project = await loadProjectByToken(token);
    if (!project) {
      content.innerHTML = `<div class="emptyState"><h2>Piano non trovato</h2><p>Il link è scaduto o è stato revocato.</p></div>`;
    } else {
      renderProject(project);
    }
  } catch (e) {
    content.innerHTML = `<div class="emptyState"><h2>Errore</h2><p>${esc(e.message)}</p></div>`;
  }
}

function esc(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

function renderProject(project) {
  const p = project.payload || {};
  const containerKey = project.container_key;

  // Definizioni veicoli (replica statica dell'app)
  const VEHICLES = {
    "20ft":   { name: "20ft Container",   length: 5898,  width: 2352, height: 2393, maxWeight: 28280 },
    "40ft":   { name: "40ft Container",   length: 12032, width: 2352, height: 2393, maxWeight: 26990 },
    "40hc":   { name: "40ft High Cube",   length: 12032, width: 2350, height: 2700, maxWeight: 28600 },
    "45hc":   { name: "45ft High Cube",   length: 13556, width: 2352, height: 2700, maxWeight: 27600 },
    "truck_eu_tautliner": { name: "EU Tautliner 13.6m", length: 13600, width: 2480, height: 2700, maxWeight: 24000 },
    "truck_eu_jumbo":     { name: "EU Jumbo 13.6m",     length: 13600, width: 2480, height: 3000, maxWeight: 24000 },
    "truck_us_53ft":      { name: "US 53ft trailer",    length: 16154, width: 2591, height: 2743, maxWeight: 19958 },
    "truck_solo":         { name: "Solo 7.2m",          length: 7200,  width: 2450, height: 2500, maxWeight: 8000 },
    "uld_ake": { name: "ULD AKE",   length: 1562, width: 1534, height: 1626, maxWeight: 1588 },
    "uld_pmc": { name: "ULD PMC",   length: 3175, width: 2235, height: 1626, maxWeight: 6804 },
    "uld_ala": { name: "ULD ALA",   length: 3175, width: 2235, height: 1626, maxWeight: 4626 }
  };
  const c = VEHICLES[containerKey] || (p.customDims && containerKey === "custom" ? p.customDims : VEHICLES["40ft"]);
  const placed = p.placed || [];

  // Footprint orientato
  function fp(item) {
    if ((item.rotation || 0) % 180 === 90) return { l: item.width, w: item.length };
    return { l: item.length, w: item.width };
  }

  // Statistiche
  let totalWeight = 0, usedArea = 0;
  placed.forEach(it => {
    totalWeight += Number(it.weight || 0);
    if ((it.z || 0) === 0) {
      const f = fp(it);
      usedArea += f.l * f.w;
    }
  });
  const areaPct = c.length && c.width ? Math.round(usedArea / (c.length * c.width) * 100) : 0;

  // SVG vista pianta
  const svgW = 1100;
  const svgH = Math.max(180, Math.round(svgW * c.width / c.length));
  const s = svgW / c.length;
  const groundCrates = placed.filter(it => (it.z || 0) === 0);

  let svg = `<svg viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">`;
  svg += `<rect x="0" y="0" width="${svgW}" height="${svgH}" fill="white" stroke="#111827" stroke-width="3"/>`;
  svg += `<rect x="0" y="0" width="${Math.max(12, 28*s)}" height="${svgH}" fill="#0369a1" opacity="0.92"/>`;
  svg += `<text x="14" y="${svgH/2}" font-size="14" fill="white" font-weight="800" text-anchor="middle" transform="rotate(-90 14 ${svgH/2})">PORTA</text>`;
  groundCrates.forEach((it, idx) => {
    const f = fp(it);
    const i = placed.indexOf(it) + 1;
    svg += `<rect x="${(it.x*s).toFixed(1)}" y="${(it.y*s).toFixed(1)}" width="${(f.l*s).toFixed(1)}" height="${(f.w*s).toFixed(1)}" fill="${it.color || "#0f766e"}" stroke="#111827" stroke-width="1"/>`;
    svg += `<text x="${(it.x*s+5).toFixed(1)}" y="${(it.y*s+14).toFixed(1)}" font-size="11" fill="white" font-weight="700">${i}. ${esc(it.name || "")}</text>`;
    svg += `<text x="${(it.x*s+5).toFixed(1)}" y="${(it.y*s+28).toFixed(1)}" font-size="9" fill="white">${it.length}×${it.width} · ${it.weight}kg</text>`;
  });
  svg += `</svg>`;

  content.innerHTML = `
    <div style="background:white;border:1px solid #e2e8f0;border-radius:14px;padding:24px;margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:16px">
        <div>
          <h1 style="margin:0;font-size:24px">${esc(project.name || "Piano di carico")}</h1>
          <p style="margin:6px 0 0;color:#64748b;font-size:14px">${esc(c.name)} · Vista in sola lettura</p>
        </div>
        <a href="/signup.html" class="btn primary">Crea anche tu il tuo</a>
      </div>

      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px">
        <div style="background:#f1f5f9;padding:12px;border-radius:10px"><div style="font-size:11px;color:#64748b">Spazio veicolo</div><div style="font-size:18px;font-weight:800;margin-top:4px">${c.length} × ${c.width} × ${c.height} mm</div></div>
        <div style="background:#f1f5f9;padding:12px;border-radius:10px"><div style="font-size:11px;color:#64748b">Casse caricate</div><div style="font-size:18px;font-weight:800;margin-top:4px">${placed.length}</div></div>
        <div style="background:#f1f5f9;padding:12px;border-radius:10px"><div style="font-size:11px;color:#64748b">Pavimento usato</div><div style="font-size:18px;font-weight:800;margin-top:4px">${areaPct}%</div></div>
        <div style="background:#f1f5f9;padding:12px;border-radius:10px"><div style="font-size:11px;color:#64748b">Peso totale</div><div style="font-size:18px;font-weight:800;margin-top:4px">${totalWeight.toLocaleString("it-IT")} kg</div></div>
      </div>

      <h2 style="font-size:18px;margin:0 0 8px">Vista pianta</h2>
      ${svg}
    </div>

    <div style="background:white;border:1px solid #e2e8f0;border-radius:14px;padding:24px">
      <h2 style="font-size:18px;margin:0 0 12px">Distinta carico (${placed.length})</h2>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead><tr style="background:#f9fafb">
            <th style="padding:8px;text-align:left;border-bottom:1px solid #e2e8f0">#</th>
            <th style="padding:8px;text-align:left;border-bottom:1px solid #e2e8f0">Nome</th>
            <th style="padding:8px;text-align:left;border-bottom:1px solid #e2e8f0">Dimensioni mm</th>
            <th style="padding:8px;text-align:left;border-bottom:1px solid #e2e8f0">Peso kg</th>
            <th style="padding:8px;text-align:left;border-bottom:1px solid #e2e8f0">Posizione</th>
            <th style="padding:8px;text-align:left;border-bottom:1px solid #e2e8f0">Note</th>
          </tr></thead>
          <tbody>
            ${placed.map((it, i) => `<tr>
              <td style="padding:8px;border-bottom:1px solid #f1f5f9">${i + 1}</td>
              <td style="padding:8px;border-bottom:1px solid #f1f5f9">${esc(it.name || "")}</td>
              <td style="padding:8px;border-bottom:1px solid #f1f5f9">${it.length} × ${it.width} × ${it.height}</td>
              <td style="padding:8px;border-bottom:1px solid #f1f5f9">${it.weight || 0}</td>
              <td style="padding:8px;border-bottom:1px solid #f1f5f9">X=${it.x} Y=${it.y} Z=${it.z||0}</td>
              <td style="padding:8px;border-bottom:1px solid #f1f5f9">${(it.z||0) > 0 ? "⬆ impilata" : ""}${it.rotation ? " ↻" : ""}</td>
            </tr>`).join("")}
          </tbody>
        </table>
      </div>
    </div>

    <div style="text-align:center;margin-top:32px;padding:24px;background:white;border-radius:14px">
      <p style="margin:0 0 12px;color:#64748b">Vuoi creare anche tu i tuoi piani di carico?</p>
      <a href="/signup.html" class="btn primary big">Inizia gratis →</a>
    </div>
  `;
}
</script>
</body>
</html>
