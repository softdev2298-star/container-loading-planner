<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Progetto condiviso — Container Loading Planner</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/styles/site.css">
</head>
<body>

<header class="siteHeader">
  <a href="/" class="brand">
    <svg width="32" height="32" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="2" y="2" width="36" height="36" rx="8" fill="#0a1628"/>
      <rect x="7" y="11" width="26" height="18" fill="none" stroke="white" stroke-width="1.4"/>
      <rect x="9" y="13" width="9" height="6" fill="white"/>
      <rect x="19" y="13" width="6" height="6" fill="white" opacity="0.8"/>
      <rect x="26" y="13" width="6" height="6" fill="white" opacity="0.6"/>
      <rect x="9" y="20" width="6" height="8" fill="white" opacity="0.7"/>
      <rect x="16" y="20" width="9" height="4" fill="white" opacity="0.85"/>
    </svg>
    <span>Container Loading Planner</span>
  </a>
  <a href="/signup.html" class="btn primary">Crea il tuo account</a>
</header>

<main class="dashWrap">
  <div id="loading" style="text-align:center;padding:60px;color:var(--text-2)">Caricamento progetto…</div>
  <div id="content" style="display:none">
    <div class="dashHeader">
      <div>
        <h1 id="projectName">—</h1>
        <p style="color:var(--text-2);font-size:13px;margin-top:6px">Progetto condiviso · sola lettura</p>
      </div>
    </div>
    <div id="info" class="emptyState" style="text-align:left;padding:30px"></div>
  </div>
</main>

<script type="module">
import { supabase } from "/lib/auth.js";

const params = new URLSearchParams(location.search);
const token = params.get("token");

if (!token) {
  document.getElementById("loading").innerHTML = `<p style="color:var(--bad)">Link non valido.</p>`;
} else {
  loadShared(token);
}

function escape(s) { return String(s || "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])) }

async function loadShared(t) {
  const { data, error } = await supabase
    .from("shared_links")
    .select("project_id, expires_at, projects(name, container_key, data, updated_at)")
    .eq("token", t)
    .maybeSingle();
  if (error || !data || !data.projects) {
    document.getElementById("loading").innerHTML = `<p style="color:var(--bad)">Progetto non trovato o link scaduto.</p>`;
    return;
  }
  const p = data.projects;
  const items = (p.data && p.data.placed) || [];
  document.getElementById("loading").style.display = "none";
  document.getElementById("content").style.display = "block";
  document.getElementById("projectName").textContent = p.name;
  document.getElementById("info").innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px">
      <div><div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.06em">Container</div><b style="font-size:16px">${escape(p.container_key || "—")}</b></div>
      <div><div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.06em">Casse</div><b style="font-size:16px">${items.length}</b></div>
      <div><div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.06em">Aggiornato</div><b style="font-size:14px">${new Date(p.updated_at).toLocaleString("it-IT")}</b></div>
    </div>
    ${items.length ? `<table style="width:100%;border-collapse:collapse;font-size:13px">
      <thead><tr style="background:rgba(10,22,40,0.04)"><th style="padding:8px;text-align:left;border-bottom:1px solid var(--line)">#</th><th style="padding:8px;text-align:left;border-bottom:1px solid var(--line)">Modello</th><th style="padding:8px;text-align:left;border-bottom:1px solid var(--line)">Dim.</th><th style="padding:8px;text-align:left;border-bottom:1px solid var(--line)">Peso</th><th style="padding:8px;text-align:left;border-bottom:1px solid var(--line)">Pos.</th></tr></thead>
      <tbody>${items.map((p, i) => `<tr><td style="padding:8px;border-bottom:1px solid var(--line)">${i+1}</td><td style="padding:8px;border-bottom:1px solid var(--line)"><b>${escape(p.model || p.name)}</b>${p.inches ? ` <span style="color:var(--text-3)">${escape(p.inches)}"</span>` : ""}</td><td style="padding:8px;border-bottom:1px solid var(--line)">${p.length}×${p.width}×${p.height}</td><td style="padding:8px;border-bottom:1px solid var(--line)">${p.weight} kg</td><td style="padding:8px;border-bottom:1px solid var(--line)">${p.x},${p.y},${p.z||0}</td></tr>`).join("")}</tbody>
    </table>` : ""}
  `;
}
</script>
</body>
</html>
