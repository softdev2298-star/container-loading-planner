<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reimposta password — Container Loading Planner</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/styles/site.css">
</head>
<body>

<div class="authWrap">
  <div class="authCard">
    <a href="/" class="brand">
      <svg width="40" height="40" viewBox="0 0 40 40">
      <rect x="2" y="2" width="36" height="36" rx="6" fill="#0f172a"/>
      <rect x="7" y="11" width="26" height="18" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
      <rect x="9"  y="13" width="9"  height="6" fill="#fbbf24"/>
      <rect x="19" y="13" width="6"  height="6" fill="#fbbf24" opacity="0.85"/>
      <rect x="26" y="13" width="6"  height="6" fill="#fbbf24" opacity="0.7"/>
      <rect x="9"  y="20" width="6"  height="8" fill="#fbbf24" opacity="0.75"/>
      <rect x="16" y="20" width="9"  height="4" fill="#fbbf24" opacity="0.85"/>
      <rect x="16" y="25" width="4"  height="3" fill="#fbbf24" opacity="0.6"/>
      <rect x="21" y="25" width="4"  height="3" fill="#fbbf24" opacity="0.6"/>
      <rect x="26" y="20" width="6"  height="8" fill="#fbbf24" opacity="0.9"/>
    </svg>
      <span>Container Loading Planner</span>
    </a>
    <h1>Imposta nuova password</h1>
    <div id="msg"></div>
    <form id="form">
      <div class="field">
        <label for="password">Nuova password (min 8 caratteri)</label>
        <input id="password" type="password" required minlength="8" autocomplete="new-password">
      </div>
      <button type="submit" class="btn primary" id="submitBtn">Aggiorna password</button>
    </form>
  </div>
</div>

<script type="module">
import { supabase } from "/lib/auth.js";

const msg = document.getElementById("msg");
const form = document.getElementById("form");
const btn = document.getElementById("submitBtn");

function showMsg(text, kind="error") {
  msg.innerHTML = `<div class="authMessage ${kind}">${text}</div>`;
}

form.addEventListener("submit", async e => {
  e.preventDefault();
  btn.disabled = true; btn.textContent = "Aggiornamento…";
  const password = document.getElementById("password").value;
  const { error } = await supabase.auth.updateUser({ password });
  if (error) {
    showMsg("Errore: " + error.message);
    btn.disabled = false; btn.textContent = "Aggiorna password";
    return;
  }
  showMsg("Password aggiornata. Reindirizzamento al dashboard…", "success");
  setTimeout(() => location.href = "/dashboard.html", 1500);
});
</script>
</body>
</html>
