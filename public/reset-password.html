<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reimposta password — Container Loading Planner</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/styles/site.css">
</head>
<body>
<main class="authWrap">
  <div class="authCard">
    <a href="/" class="brand"><span class="logoMark"><svg viewBox="0 0 40 40"><rect x="5" y="9" width="30" height="22" rx="2" fill="none" stroke="#fff" stroke-width="2"/><rect x="8" y="12" width="10" height="7" fill="#f5b301"/><rect x="20" y="12" width="6" height="7" fill="#f5b301"/><rect x="28" y="12" width="4" height="7" fill="#f5b301"/><rect x="8" y="21" width="7" height="7" fill="#f5b301"/><rect x="17" y="21" width="9" height="7" fill="#f5b301"/><rect x="28" y="21" width="4" height="7" fill="#f5b301"/></svg></span><span>Container Loading Planner</span></a>
    <h1>Imposta nuova password</h1>
    <p class="sub">Scegli una password sicura per rientrare nei tuoi progetti.</p>
    <div id="msg"></div>
    <form id="form">
      <div class="field"><label for="password">Nuova password, minimo 8 caratteri</label><input id="password" type="password" required minlength="8" autocomplete="new-password"></div>
      <button type="submit" class="btn primary" id="submitBtn">Aggiorna password</button>
    </form>
  </div>
</main>
<script type="module">
import { supabase } from "/lib/auth.js";
const msg = document.getElementById("msg");
const form = document.getElementById("form");
const btn = document.getElementById("submitBtn");
function showMsg(text, kind="error") { msg.innerHTML = `<div class="authMessage ${kind}">${text}</div>`; }
form.addEventListener("submit", async e => {
  e.preventDefault();
  btn.disabled = true; btn.textContent = "Aggiornamento…";
  const password = document.getElementById("password").value;
  const { error } = await supabase.auth.updateUser({ password });
  if (error) { showMsg("Errore: " + error.message); btn.disabled = false; btn.textContent = "Aggiorna password"; return; }
  showMsg("Password aggiornata. Reindirizzamento al dashboard…", "success");
  setTimeout(() => location.href = "/dashboard.html", 1500);
});
</script>
</body>
</html>
