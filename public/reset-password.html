<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reimposta password — Container Loading Planner</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/styles/site.css">
</head>
<body>

<div class="authWrap">
  <div class="authCard">
    <a href="/" class="brand">
      <svg width="36" height="36" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="2" y="2" width="36" height="36" rx="8" fill="#0a1628"/>
      </svg>
      <span>Container Loading Planner</span>
    </a>

    <h1>Nuova password</h1>
    <p class="sub">Inserisci la tua nuova password.</p>

    <div id="msg"></div>

    <form id="resetForm">
      <div class="field">
        <label for="password">Nuova password (min 8 caratteri)</label>
        <input id="password" type="password" required minlength="8" autocomplete="new-password">
      </div>
      <button type="submit" class="btn primary" id="submitBtn">Imposta nuova password</button>
    </form>
  </div>
</div>

<script type="module">
import { supabase } from "/lib/auth.js";

const form = document.getElementById("resetForm");
const msg = document.getElementById("msg");
const btn = document.getElementById("submitBtn");

function showMsg(text, kind = "error") {
  msg.innerHTML = `<div class="authMessage ${kind}">${text}</div>`;
}

form.addEventListener("submit", async e => {
  e.preventDefault();
  btn.disabled = true; btn.textContent = "Aggiornamento…";
  const password = document.getElementById("password").value;
  const { error } = await supabase.auth.updateUser({ password });
  if (error) {
    showMsg("Errore: " + error.message);
    btn.disabled = false; btn.textContent = "Imposta nuova password";
    return;
  }
  showMsg("Password aggiornata. Reindirizzamento…", "success");
  setTimeout(() => location.href = "/dashboard.html", 1500);
});
</script>
</body>
</html>
