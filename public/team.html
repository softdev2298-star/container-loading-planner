<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Team — Container Loading Planner</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/styles/site.css">
</head>
<body class="appShell">
<header class="siteHeader"><div class="siteHeaderInner"><a href="/dashboard.html" class="brand"><span class="logoMark"><svg viewBox="0 0 40 40"><rect x="5" y="9" width="30" height="22" rx="2" fill="none" stroke="#fff" stroke-width="2"/><rect x="8" y="12" width="10" height="7" fill="#f5b301"/><rect x="20" y="12" width="6" height="7" fill="#f5b301"/><rect x="28" y="12" width="4" height="7" fill="#f5b301"/><rect x="8" y="21" width="7" height="7" fill="#f5b301"/><rect x="17" y="21" width="9" height="7" fill="#f5b301"/><rect x="28" y="21" width="4" height="7" fill="#f5b301"/></svg></span><span>Container Loading Planner<small>Team</small></span></a><nav class="siteNav"><a href="/dashboard.html">Progetti</a><a href="/team.html" class="active">Team</a><a href="#" id="logoutBtn">Logout</a></nav></div></header>
<main class="dashWrap">
  <section class="dashHero"><div><span class="badge">Team workspace</span><h1>Gestisci il tuo team</h1><p id="companyInfo">Caricamento azienda…</p></div><button id="inviteBtn" class="btn gold big">+ Invita membro</button></section>
  <div id="content"><div class="loadingState">Caricamento…</div></div>
</main>
<div class="modalBackdrop" id="inviteModal">
  <div class="modal"><div class="modalHead"><div><h2>Invita un nuovo membro</h2><p style="margin:6px 0 0;color:var(--muted);font-size:13px">Genera un link di invito valido 14 giorni.</p></div><button id="closeInviteModal">✕</button></div><div class="field"><label for="inviteEmail">Email del membro</label><input id="inviteEmail" type="email" required></div><div id="inviteResult" style="display:none"></div><div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px"><button id="closeInviteBtn" class="btn ghost">Chiudi</button><button id="generateInviteBtn" class="btn primary">Genera link</button></div></div>
</div>
<script type="module">
import { requireAuth, signOut, getMyCompany, listTeamMembers, listInvitations, createInvitation, deleteInvitation, removeMember } from "/lib/auth.js";
const user = await requireAuth();
document.getElementById("logoutBtn").addEventListener("click", e => { e.preventDefault(); signOut(); });
const company = await getMyCompany();
if (!company) {
  document.getElementById("companyInfo").textContent = "Nessuna azienda collegata all'account.";
  document.getElementById("inviteBtn").style.display = "none";
  document.getElementById("content").innerHTML = `<div class="emptyState"><h2>Nessuna azienda</h2><p>Salva un progetto dal planner per inizializzare il workspace.</p><a href="/app.html" class="btn primary">Vai al planner</a></div>`;
} else {
  document.getElementById("companyInfo").innerHTML = `<b>${esc(company.name)}</b> · ${esc(company.country)} · Ruolo: <b>${company.role === "admin" ? "Admin" : "Membro"}</b>`;
  if (company.role !== "admin") document.getElementById("inviteBtn").style.display = "none";
  refresh();
}
async function refresh() {
  try {
    const [members, invites] = await Promise.all([listTeamMembers(company.id), company.role === "admin" ? listInvitations(company.id) : Promise.resolve([])]);
    let html = `<div class="grid2"><section class="card"><h3 style="margin-top:0">Membri attivi (${members.length})</h3><div class="memberList">`;
    html += members.map(m => { const isMe = m.user_id === user.id; return `<div class="memberRow"><div class="memberInfo"><div class="memberAvatar">${isMe ? (user.email || "tu").slice(0,2) : "MB"}</div><div><strong>${isMe ? "Tu" : "Membro"}</strong><small>${m.user_id}</small></div></div><div style="display:flex;gap:8px;align-items:center"><span class="rolePill ${m.role === "admin" ? "admin" : ""}">${m.role}</span>${(company.role === "admin" && !isMe) ? `<button class="btn danger" data-remove="${m.id}">Rimuovi</button>` : ""}</div></div>`; }).join("") || `<p style="color:var(--muted)">Nessun membro.</p>`;
    html += `</div></section><section class="card"><h3 style="margin-top:0">Inviti pendenti (${invites.length})</h3><div class="memberList">`;
    html += invites.length ? invites.map(inv => { const expired = inv.expires_at && new Date(inv.expires_at) < new Date(); return `<div class="memberRow"><div><strong>${esc(inv.email)}</strong><small>${expired ? "Scaduto" : "In attesa"} · ${new Date(inv.created_at).toLocaleDateString("it-IT")}</small></div><div style="display:flex;gap:8px"><button class="btn ghost" data-copy="${inv.token}">Copia link</button><button class="btn danger" data-cancel="${inv.id}">Annulla</button></div></div>`; }).join("") : `<p style="color:var(--muted)">Nessun invito pendente.</p>`;
    html += `</div></section></div>`;
    document.getElementById("content").innerHTML = html;
    document.querySelectorAll("[data-remove]").forEach(b => b.addEventListener("click", async () => { if (!confirm("Rimuovere questo membro?")) return; await removeMember(b.dataset.remove); refresh(); }));
    document.querySelectorAll("[data-cancel]").forEach(b => b.addEventListener("click", async () => { if (!confirm("Annullare questo invito?")) return; await deleteInvitation(b.dataset.cancel); refresh(); }));
    document.querySelectorAll("[data-copy]").forEach(b => b.addEventListener("click", () => { const url = location.origin + "/signup.html?invite=" + b.dataset.copy; navigator.clipboard.writeText(url); b.textContent = "Copiato"; setTimeout(() => b.textContent = "Copia link", 1500); }));
  } catch (err) { document.getElementById("content").innerHTML = `<div class="emptyState"><h2>Errore</h2><p>${esc(err.message)}</p></div>`; }
}
document.getElementById("inviteBtn").addEventListener("click", () => { document.getElementById("inviteModal").style.display = "flex"; document.getElementById("inviteResult").style.display = "none"; document.getElementById("inviteEmail").value = ""; });
document.getElementById("closeInviteModal").addEventListener("click", () => document.getElementById("inviteModal").style.display = "none");
document.getElementById("closeInviteBtn").addEventListener("click", () => document.getElementById("inviteModal").style.display = "none");
document.getElementById("generateInviteBtn").addEventListener("click", async () => { const email = document.getElementById("inviteEmail").value.trim(); if (!email || !email.includes("@")) { alert("Email non valida"); return; } try { const inv = await createInvitation(company.id, email); const url = location.origin + "/signup.html?invite=" + inv.token; document.getElementById("inviteResult").innerHTML = `<div class="authMessage success">Invito creato.<br><input readonly value="${esc(url)}" style="margin-top:8px;width:100%;padding:8px;border:1px solid var(--line);border-radius:10px"></div>`; document.getElementById("inviteResult").style.display = "block"; refresh(); } catch (e) { alert("Errore: " + e.message); } });
function esc(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
</script>
</body>
</html>
