<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Team — Container Loading Planner</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/styles/site.css">
<style>
.memberRow {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 16px;
  background: white;
  border: 1px solid var(--line);
  border-radius: 12px;
  margin-bottom: 8px;
}
.memberInfo { display: flex; align-items: center; gap: 12px }
.memberAvatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--accent);
  color: white;
  display: flex; align-items: center; justify-content: center;
  font-weight: 600;
  font-size: 13px;
  text-transform: uppercase;
}
.memberRow b { font-size: 14px; font-weight: 600; display: block }
.memberRow .role {
  font-size: 11px;
  background: var(--accent-soft);
  color: var(--accent);
  padding: 3px 10px;
  border-radius: 20px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.memberRow .role.admin { background: var(--navy); color: white }
.memberRow .meta { font-size: 12px; color: var(--text-2); margin-top: 2px }
</style>
</head>
<body>

<header class="siteHeader">
  <a href="/" class="brand">
    <svg width="32" height="32" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="2" y="2" width="36" height="36" rx="8" fill="#0a1628"/>
      <rect x="7" y="11" width="26" height="18" fill="none" stroke="white" stroke-width="1.4"/>
      <rect x="9" y="13" width="9" height="6" fill="white"/>
      <rect x="19" y="13" width="6" height="6" fill="white" opacity="0.8"/>
      <rect x="26" y="13" width="6" height="6" fill="white" opacity="0.6"/>
      <rect x="9" y="20" width="6" height="8" fill="white" opacity="0.7"/>
      <rect x="16" y="20" width="9" height="4" fill="white" opacity="0.85"/>
      <rect x="16" y="25" width="4" height="3" fill="white" opacity="0.5"/>
      <rect x="21" y="25" width="4" height="3" fill="white" opacity="0.5"/>
      <rect x="26" y="20" width="6" height="8" fill="white" opacity="0.9"/>
    </svg>
    <span>Container Loading Planner</span>
  </a>
  <nav>
    <a href="/dashboard.html">Progetti</a>
    <a href="/team.html" class="active"><b>Team</b></a>
    <a href="#" id="logoutBtn">Logout</a>
  </nav>
</header>

<main class="dashWrap">
  <div class="dashHeader">
    <div>
      <h1>Membri del team</h1>
      <p style="color:var(--text-2);margin-top:4px;font-size:14px">Invita colleghi a collaborare sui progetti.</p>
    </div>
    <button class="btn primary" id="inviteBtn">+ Invita membro</button>
  </div>

  <div id="loading" style="text-align:center;padding:40px;color:var(--text-2)">Caricamento…</div>
  <div id="members"></div>

  <h2 style="margin-top:32px;margin-bottom:14px;font-size:18px;font-weight:600">Inviti pendenti</h2>
  <div id="invitations"></div>
</main>

<!-- Modal invita -->
<div id="inviteModal" style="display:none;position:fixed;inset:0;background:rgba(10,22,40,0.4);backdrop-filter:blur(4px);z-index:100;align-items:center;justify-content:center">
  <div style="background:white;padding:28px;border-radius:14px;width:100%;max-width:440px;margin:20px;box-shadow:var(--shadow-lg)">
    <h2 style="margin:0 0 6px;font-size:20px;font-weight:600">Invita un membro</h2>
    <p style="color:var(--text-2);font-size:13px;margin:0 0 18px">L'utente riceverà un'email per registrarsi.</p>
    <div id="inviteMsg"></div>
    <div class="field">
      <label for="inviteEmail">Email</label>
      <input id="inviteEmail" type="email" required>
    </div>
    <div style="display:flex;gap:10px;margin-top:18px;justify-content:flex-end">
      <button class="btn ghost" onclick="document.getElementById('inviteModal').style.display='none'">Annulla</button>
      <button class="btn primary" id="sendInviteBtn">Invia invito</button>
    </div>
  </div>
</div>

<script type="module">
import { supabase, requireAuth, signOut, listMembers, listInvitations, createInvitation, revokeInvitation } from "/lib/auth.js";

const user = await requireAuth();

document.getElementById("logoutBtn").addEventListener("click", async e => {
  e.preventDefault();
  await signOut();
});

document.getElementById("inviteBtn").addEventListener("click", () => {
  document.getElementById("inviteModal").style.display = "flex";
  document.getElementById("inviteEmail").value = "";
  document.getElementById("inviteMsg").innerHTML = "";
});

document.getElementById("sendInviteBtn").addEventListener("click", async () => {
  const email = document.getElementById("inviteEmail").value.trim();
  if (!email) return;
  const btn = document.getElementById("sendInviteBtn");
  btn.disabled = true; btn.textContent = "Invio…";
  const { data, error } = await createInvitation(email);
  if (error) {
    document.getElementById("inviteMsg").innerHTML = `<div class="authMessage error">${error.message}</div>`;
    btn.disabled = false; btn.textContent = "Invia invito";
    return;
  }
  document.getElementById("inviteMsg").innerHTML = `<div class="authMessage success">Invito creato. Link: <code style="word-break:break-all;font-size:11px">${location.origin}/signup.html?invite=${data.token}</code></div>`;
  btn.textContent = "Inviato";
  setTimeout(() => {
    document.getElementById("inviteModal").style.display = "none";
    btn.disabled = false; btn.textContent = "Invia invito";
    loadAll();
  }, 4000);
});

function escape(s) { return String(s || "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])) }

async function loadAll() {
  document.getElementById("loading").style.display = "block";
  const m = await listMembers();
  const inv = await listInvitations();
  document.getElementById("loading").style.display = "none";

  if (m.error) {
    document.getElementById("members").innerHTML = `<p style="color:var(--bad)">Errore: ${m.error.message}</p>`;
    return;
  }
  document.getElementById("members").innerHTML = m.data.map(member => `
    <div class="memberRow">
      <div class="memberInfo">
        <div class="memberAvatar">${(member.email || "?").slice(0,2)}</div>
        <div>
          <b>${escape(member.email || "—")}</b>
          <div class="meta">${member.role === "admin" ? "Amministratore" : "Membro"}</div>
        </div>
      </div>
      <span class="role ${member.role}">${member.role}</span>
    </div>
  `).join("") || `<p style="color:var(--text-2);text-align:center;padding:30px">Nessun membro</p>`;

  document.getElementById("invitations").innerHTML = inv.data && inv.data.length ? inv.data.map(i => `
    <div class="memberRow">
      <div>
        <b>${escape(i.email)}</b>
        <div class="meta">Inviato il ${new Date(i.created_at).toLocaleDateString("it-IT")}</div>
      </div>
      <button class="btn ghost" data-id="${i.id}" data-action="revoke" style="color:var(--bad);border-color:rgba(220,38,38,0.2)">Revoca</button>
    </div>
  `).join("") : `<p style="color:var(--text-2);text-align:center;padding:20px">Nessun invito pendente</p>`;

  document.querySelectorAll('[data-action="revoke"]').forEach(b => b.addEventListener("click", async () => {
    if (!confirm("Revocare invito?")) return;
    await revokeInvitation(b.dataset.id);
    loadAll();
  }));
}

loadAll();
</script>
</body>
</html>
