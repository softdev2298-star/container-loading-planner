<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid meet">
  <rect width="800" height="500" fill="#f8fafc"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="220" height="500" fill="#fff" stroke="#e2e8f0"/>
  <rect x="16" y="20" width="188" height="42" rx="8" fill="#f1f5f9"/>
  <rect x="28" y="32" width="120" height="8" rx="2" fill="#94a3b8"/>
  <rect x="28" y="46" width="80" height="6" rx="2" fill="#cbd5e1"/>

  <rect x="16" y="78" width="188" height="42" rx="8" fill="#f1f5f9"/>
  <rect x="28" y="90" width="100" height="8" rx="2" fill="#94a3b8"/>
  <rect x="28" y="104" width="60" height="6" rx="2" fill="#cbd5e1"/>

  <rect x="16" y="136" width="188" height="42" rx="8" fill="#f1f5f9"/>
  <rect x="28" y="148" width="110" height="8" rx="2" fill="#94a3b8"/>
  <rect x="28" y="162" width="70" height="6" rx="2" fill="#cbd5e1"/>

  <rect x="16" y="194" width="188" height="42" rx="8" fill="#f1f5f9"/>
  <rect x="28" y="206" width="90" height="8" rx="2" fill="#94a3b8"/>
  <rect x="28" y="220" width="60" height="6" rx="2" fill="#cbd5e1"/>

  <!-- Main content area -->
  <rect x="240" y="20" width="540" height="40" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <rect x="252" y="32" width="100" height="8" rx="2" fill="#0f172a"/>
  <rect x="600" y="28" width="80" height="24" rx="6" fill="#0f172a"/>
  <rect x="690" y="28" width="80" height="24" rx="6" fill="#fbbf24"/>

  <!-- Container view -->
  <rect x="240" y="76" width="540" height="200" rx="6" fill="#e2e8f0" stroke="#94a3b8"/>
  <rect x="248" y="84" width="524" height="184" fill="#fff" stroke="#0f172a" stroke-width="2"/>

  <!-- Crates -->
  <rect x="260" y="100" width="120" height="50" fill="#a98358" stroke="#3a2412" stroke-width="1.5"/>
  <text x="270" y="120" font-family="Arial" font-size="11" font-weight="700" fill="#fff">1. F30-2</text>
  <text x="270" y="134" font-family="Arial" font-size="9" fill="#fff">2850×1000</text>

  <rect x="384" y="100" width="120" height="50" fill="#a98358" stroke="#3a2412" stroke-width="1.5"/>
  <text x="394" y="120" font-family="Arial" font-size="11" font-weight="700" fill="#fff">2. F30-3</text>
  <text x="394" y="134" font-family="Arial" font-size="9" fill="#fff">3050×1000</text>

  <rect x="508" y="100" width="120" height="50" fill="#a98358" stroke="#3a2412" stroke-width="1.5"/>
  <text x="518" y="120" font-family="Arial" font-size="11" font-weight="700" fill="#fff">3. F30-4</text>
  <text x="518" y="134" font-family="Arial" font-size="9" fill="#fff">3250×1000</text>

  <rect x="260" y="156" width="120" height="50" fill="#9c7349" stroke="#3a2412" stroke-width="1.5"/>
  <text x="270" y="176" font-family="Arial" font-size="11" font-weight="700" fill="#fff">4. F30-2 S</text>

  <rect x="384" y="156" width="120" height="50" fill="#9c7349" stroke="#3a2412" stroke-width="1.5"/>
  <text x="394" y="176" font-family="Arial" font-size="11" font-weight="700" fill="#fff">5. F30-3 S</text>

  <rect x="508" y="156" width="100" height="50" fill="#caa66a" stroke="#3a2412" stroke-width="1.5" opacity="0.85"/>
  <text x="518" y="176" font-family="Arial" font-size="11" font-weight="700" fill="#fff">6. Alim. ⬆</text>

  <!-- Door -->
  <rect x="248" y="84" width="14" height="184" fill="#0369a1" opacity="0.92"/>
  <text x="255" y="180" font-family="Arial" font-size="11" font-weight="800" fill="#fff" transform="rotate(-90 255 180)">PORTA</text>

  <!-- Bottom panels -->
  <rect x="240" y="296" width="260" height="180" rx="6" fill="#fff" stroke="#e2e8f0"/>
  <text x="252" y="318" font-family="Arial" font-size="13" font-weight="700" fill="#0f172a">Baricentro &amp; assi</text>
  <rect x="252" y="332" width="118" height="40" rx="6" fill="#f1f5f9"/>
  <text x="260" y="346" font-family="Arial" font-size="9" fill="#64748b">Baricentro X</text>
  <text x="260" y="362" font-family="Arial" font-size="13" font-weight="700" fill="#0f172a">5840 mm</text>
  <rect x="378" y="332" width="118" height="40" rx="6" fill="#f1f5f9"/>
  <text x="386" y="346" font-family="Arial" font-size="9" fill="#64748b">Baricentro Y</text>
  <text x="386" y="362" font-family="Arial" font-size="13" font-weight="700" fill="#0f172a">1180 mm</text>
  <rect x="252" y="380" width="118" height="40" rx="6" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="260" y="394" font-family="Arial" font-size="9" fill="#065f46">Asse anteriore</text>
  <text x="260" y="410" font-family="Arial" font-size="13" font-weight="700" fill="#065f46">5800 kg</text>
  <rect x="378" y="380" width="118" height="40" rx="6" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="386" y="394" font-family="Arial" font-size="9" fill="#065f46">Asse posteriore</text>
  <text x="386" y="410" font-family="Arial" font-size="13" font-weight="700" fill="#065f46">5400 kg</text>

  <rect x="510" y="296" width="270" height="180" rx="6" fill="#fff" stroke="#e2e8f0"/>
  <text x="522" y="318" font-family="Arial" font-size="13" font-weight="700" fill="#0f172a">Controlli automatici</text>
  <rect x="522" y="332" width="246" height="32" rx="6" fill="#ecfdf5"/>
  <text x="534" y="352" font-family="Arial" font-size="11" fill="#065f46">✓ Nessuna sovrapposizione</text>
  <rect x="522" y="370" width="246" height="32" rx="6" fill="#ecfdf5"/>
  <text x="534" y="390" font-family="Arial" font-size="11" fill="#065f46">✓ Baricentro entro tolleranze</text>
  <rect x="522" y="408" width="246" height="32" rx="6" fill="#ecfdf5"/>
  <text x="534" y="428" font-family="Arial" font-size="11" fill="#065f46">✓ Peso totale OK (11.200 kg)</text>
</svg>
