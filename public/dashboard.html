<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard — Container Loading Planner</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/styles/site.css">
</head>
<body>

<header class="siteHeader">
  <a href="/" class="brand">
    <svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="2" y="2" width="36" height="36" rx="6" fill="#0f172a"/>
      <rect x="7" y="11" width="26" height="18" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
      <rect x="9"  y="13" width="9"  height="6" fill="#fbbf24"/>
      <rect x="19" y="13" width="6"  height="6" fill="#fbbf24" opacity="0.85"/>
      <rect x="26" y="13" width="6"  height="6" fill="#fbbf24" opacity="0.7"/>
      <rect x="9"  y="20" width="6"  height="8" fill="#fbbf24" opacity="0.75"/>
      <rect x="16" y="20" width="9"  height="4" fill="#fbbf24" opacity="0.85"/>
      <rect x="16" y="25" width="4"  height="3" fill="#fbbf24" opacity="0.6"/>
      <rect x="21" y="25" width="4"  height="3" fill="#fbbf24" opacity="0.6"/>
      <rect x="26" y="20" width="6"  height="8" fill="#fbbf24" opacity="0.9"/>
    </svg>
    <span>Container Loading Planner</span>
  </a>
  <nav>
    <a href="/dashboard.html"><b>Progetti</b></a>
    <a href="/team.html">Team</a>
    <div style="position:relative;display:inline-block" id="navMenuWrap">
      <button id="navMenuBtn" class="btn ghost" style="display:flex;align-items:center;gap:4px">
        <span id="userEmail" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span> ▾
      </button>
      <div id="navDropdown" style="display:none;position:absolute;right:0;top:calc(100% + 4px);background:white;border:1px solid #e2e8f0;border-radius:8px;min-width:200px;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,.1)">
        <div style="padding:10px 14px;border-bottom:1px solid #f1f5f9;font-size:11px;color:#94a3b8" id="navDropdownEmail"></div>
        <a href="/dashboard.html" style="display:block;padding:10px 14px;color:#1e293b;text-decoration:none;font-size:13px">📁 Progetti</a>
        <a href="/team.html" style="display:block;padding:10px 14px;color:#1e293b;text-decoration:none;font-size:13px">👥 Team</a>
        <a href="#" id="logoutBtn" style="display:block;padding:10px 14px;color:#dc2626;text-decoration:none;font-size:13px;border-top:1px solid #f1f5f9">Logout</a>
      </div>
    </div>
  </nav>
</header>

<main class="dashWrap">
  <div class="dashHeader">
    <div>
      <h1>I miei progetti</h1>
      <p id="companyHint" style="margin:4px 0 0;color:#64748b;font-size:13px"></p>
    </div>
    <a href="/app.html" class="btn primary">+ Nuovo progetto</a>
  </div>

  <div id="content"><div class="emptyState"><p>Caricamento…</p></div></div>
</main>

<script type="module">
import { requireAuth, listProjects, deleteProject, signOut, getMyCompany } from "/lib/auth.js";

const user = await requireAuth();
if (user) {
  document.getElementById("userEmail").textContent = user.email;
  const dde = document.getElementById("navDropdownEmail");
  if (dde) dde.textContent = user.email;
}
document.getElementById("logoutBtn").addEventListener("click", e => { e.preventDefault(); signOut(); });
document.getElementById("navMenuBtn").addEventListener("click", e => {
  e.stopPropagation();
  const dd = document.getElementById("navDropdown");
  dd.style.display = dd.style.display === "none" ? "block" : "none";
});
document.addEventListener("click", () => { document.getElementById("navDropdown").style.display = "none"; });

const company = await getMyCompany();
if (company) {
  document.getElementById("companyHint").innerHTML =
    `<b>${esc(company.name)}</b> · I progetti sono condivisi con il team`;
}

const content = document.getElementById("content");

async function refresh() {
  try {
    const projects = await listProjects();
    if (!projects.length) {
      content.innerHTML = `
        <div class="emptyState">
          <h2>Non hai ancora progetti</h2>
          <p>Crea il tuo primo layout container in pochi minuti.</p>
          <a href="/app.html" class="btn primary big">+ Crea primo progetto</a>
        </div>`;
      return;
    }
    content.innerHTML = `
      <div class="projectGrid">
        ${projects.map(p => `
          <div class="projectCard" data-id="${p.id}">
            <h3>${esc(p.name || "Senza nome")}</h3>
            <p>${esc(p.container_key || "—")}${p.owner !== user.id ? " · 👥 team" : ""}</p>
            <div class="meta">
              <span>${formatDate(p.updated_at)}</span>
              <button class="btn ghost" data-act="delete" data-id="${p.id}" style="padding:4px 8px;font-size:12px">Elimina</button>
            </div>
          </div>
        `).join("")}
        <a href="/app.html" class="projectCard newCard">
          <div>
            <div style="font-size:32px;margin-bottom:8px">+</div>
            <strong>Nuovo progetto</strong>
          </div>
        </a>
      </div>
    `;
    content.querySelectorAll(".projectCard[data-id]").forEach(el => {
      el.addEventListener("click", e => {
        if (e.target.dataset.act === "delete") return;
        location.href = "/app.html?id=" + el.dataset.id;
      });
    });
    content.querySelectorAll('[data-act="delete"]').forEach(btn => {
      btn.addEventListener("click", async e => {
        e.stopPropagation();
        if (!confirm("Eliminare definitivamente questo progetto?")) return;
        try { await deleteProject(btn.dataset.id); refresh(); }
        catch (err) { alert("Errore: " + err.message); }
      });
    });
  } catch (err) {
    content.innerHTML = `<div class="emptyState"><h2>Errore</h2><p>${esc(err.message)}</p></div>`;
  }
}

function formatDate(s) {
  if (!s) return "";
  return new Date(s).toLocaleDateString("it-IT", { day: "numeric", month: "short", year: "numeric" });
}
function esc(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

refresh();
</script>
</body>
</html>
