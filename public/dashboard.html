<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Progetti — Container Loading Planner</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/styles/site.css">
<style>
.dashUserMenu { position: relative }
.dashUserBtn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px 6px 6px;
  border: 1px solid var(--line-strong);
  background: white;
  border-radius: 10px;
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
  color: var(--text);
  transition: background-color 0.15s ease, border-color 0.15s ease;
}
.dashUserBtn:hover { background: rgba(10, 22, 40, 0.03); border-color: rgba(10, 22, 40, 0.22) }
.dashAvatar {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--accent);
  color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600;
  text-transform: uppercase;
}
.dashDropdown {
  display: none;
  position: absolute;
  right: 0;
  top: calc(100% + 8px);
  background: white;
  border: 1px solid var(--line);
  border-radius: 10px;
  min-width: 220px;
  z-index: 999;
  box-shadow: var(--shadow-lg);
  padding: 6px;
}
.dashDropdownHeader { padding: 10px 12px 8px; border-bottom: 1px solid var(--line); margin-bottom: 4px; font-size: 12px; color: var(--text-2); word-break: break-all; font-weight: 500 }
.dashDropdownItem {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  color: var(--text);
  text-decoration: none;
  font-size: 13px;
  border-radius: 7px;
  font-weight: 500;
}
.dashDropdownItem:hover { background: rgba(10, 22, 40, 0.04) }
.dashDropdownItem svg { color: var(--text-2) }
.dashDropdownDivider { height: 1px; background: var(--line); margin: 4px 0 }
.dashDropdownDanger { color: var(--bad) }
.dashDropdownDanger svg { color: var(--bad) }
.dashDropdownDanger:hover { background: var(--bad-soft) }
</style>
</head>
<body>

<header class="siteHeader">
  <a href="/" class="brand">
    <svg width="32" height="32" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="2" y="2" width="36" height="36" rx="8" fill="#0a1628"/>
      <rect x="7" y="11" width="26" height="18" fill="none" stroke="white" stroke-width="1.4"/>
      <rect x="9" y="13" width="9" height="6" fill="white"/>
      <rect x="19" y="13" width="6" height="6" fill="white" opacity="0.8"/>
      <rect x="26" y="13" width="6" height="6" fill="white" opacity="0.6"/>
      <rect x="9" y="20" width="6" height="8" fill="white" opacity="0.7"/>
      <rect x="16" y="20" width="9" height="4" fill="white" opacity="0.85"/>
      <rect x="16" y="25" width="4" height="3" fill="white" opacity="0.5"/>
      <rect x="21" y="25" width="4" height="3" fill="white" opacity="0.5"/>
      <rect x="26" y="20" width="6" height="8" fill="white" opacity="0.9"/>
    </svg>
    <span>Container Loading Planner</span>
  </a>
  <div class="dashUserMenu" id="userMenuWrap">
    <button class="dashUserBtn" id="userMenuBtn">
      <span class="dashAvatar" id="dashAvatar">—</span>
      <span id="userEmail">—</span>
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none" style="opacity:0.55"><path d="M2 4l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="dashDropdown" id="userDropdown">
      <div class="dashDropdownHeader" id="userDropdownEmail"></div>
      <a href="/dashboard.html" class="dashDropdownItem">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 4.5C2 3.67 2.67 3 3.5 3h3l1.5 1.5h4.5c.83 0 1.5.67 1.5 1.5v6c0 .83-.67 1.5-1.5 1.5h-9C2.67 13 2 12.33 2 11.5v-7z" stroke="currentColor" stroke-width="1.3"/></svg>
        Progetti
      </a>
      <a href="/team.html" class="dashDropdownItem">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="6" cy="5.5" r="2.5" stroke="currentColor" stroke-width="1.3"/><path d="M2 13c0-2.2 1.8-4 4-4s4 1.8 4 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><circle cx="11.5" cy="6" r="2" stroke="currentColor" stroke-width="1.3"/><path d="M14 12.5c-.5-1.5-1.5-2.5-3-2.8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        Team
      </a>
      <div class="dashDropdownDivider"></div>
      <a href="#" id="logoutBtn" class="dashDropdownItem dashDropdownDanger">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M9 4V3a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h4a1 1 0 0 0 1-1v-1M7 8h7m0 0l-2.5-2.5M14 8l-2.5 2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Logout
      </a>
    </div>
  </div>
</header>

<main class="dashWrap">
  <div class="dashHeader">
    <div>
      <h1>I tuoi progetti</h1>
      <p style="color:var(--text-2);margin-top:4px;font-size:14px">Gestisci, condividi e collabora.</p>
    </div>
    <a href="/app.html" class="btn primary">+ Nuovo progetto</a>
  </div>

  <div id="loading" style="text-align:center;padding:60px;color:var(--text-2)">Caricamento…</div>
  <div id="grid" class="projectGrid" style="display:none"></div>
  <div id="empty" class="emptyState" style="display:none">
    <h2>Nessun progetto ancora</h2>
    <p>Crea il tuo primo progetto per iniziare a pianificare i container.</p>
    <a href="/app.html" class="btn primary">+ Crea il primo progetto</a>
  </div>
</main>

<script type="module">
import { supabase, requireAuth, signOut, listProjects, deleteProject } from "/lib/auth.js";

const user = await requireAuth();
if (user) {
  document.getElementById("userEmail").textContent = user.email;
  document.getElementById("userDropdownEmail").textContent = user.email;
  document.getElementById("dashAvatar").textContent = user.email.slice(0, 2);
}

document.getElementById("userMenuBtn").addEventListener("click", e => {
  e.stopPropagation();
  const dd = document.getElementById("userDropdown");
  dd.style.display = dd.style.display === "block" ? "none" : "block";
});
document.addEventListener("click", () => { document.getElementById("userDropdown").style.display = "none"; });

document.getElementById("logoutBtn").addEventListener("click", async e => {
  e.preventDefault();
  await signOut();
});

async function loadProjects() {
  const { data, error } = await listProjects();
  document.getElementById("loading").style.display = "none";
  if (error) {
    document.getElementById("loading").innerHTML = `<p style="color:var(--bad)">Errore: ${error.message}</p>`;
    document.getElementById("loading").style.display = "block";
    return;
  }
  if (!data || data.length === 0) {
    document.getElementById("empty").style.display = "block";
    return;
  }
  const grid = document.getElementById("grid");
  grid.style.display = "grid";
  grid.innerHTML = `<a href="/app.html" class="projectCard newCard">
    <div>
      <div>+</div>
      <div>Nuovo progetto</div>
    </div>
  </a>` + data.map(p => `
    <a href="/app.html?project=${p.id}" class="projectCard">
      <h3>${escape(p.name || "Senza nome")}</h3>
      <p>${escape(p.container_key || "Container non specificato")}</p>
      <div class="meta">
        <span>${new Date(p.updated_at).toLocaleDateString("it-IT")}</span>
        <button data-id="${p.id}" class="deleteBtn">Elimina</button>
      </div>
    </a>
  `).join("");

  grid.querySelectorAll(".deleteBtn").forEach(b => b.addEventListener("click", async e => {
    e.preventDefault(); e.stopPropagation();
    if (!confirm("Eliminare questo progetto?")) return;
    const id = b.dataset.id;
    const { error } = await deleteProject(id);
    if (error) { alert("Errore: " + error.message); return; }
    loadProjects();
  }));
}

function escape(s) {
  return String(s || "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
}

loadProjects();
</script>
</body>
</html>
