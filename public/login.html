<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Accedi — Container Loading Planner</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/styles/site.css">
</head>
<body>

<div class="authWrap">
  <div class="authCard">
    <a href="/" class="brand">
      <svg width="36" height="36" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="2" y="2" width="36" height="36" rx="8" fill="#0a1628"/>
        <rect x="7" y="11" width="26" height="18" fill="none" stroke="white" stroke-width="1.4"/>
        <rect x="9" y="13" width="9" height="6" fill="white"/>
        <rect x="19" y="13" width="6" height="6" fill="white" opacity="0.8"/>
        <rect x="26" y="13" width="6" height="6" fill="white" opacity="0.6"/>
        <rect x="9" y="20" width="6" height="8" fill="white" opacity="0.7"/>
        <rect x="16" y="20" width="9" height="4" fill="white" opacity="0.85"/>
        <rect x="16" y="25" width="4" height="3" fill="white" opacity="0.5"/>
        <rect x="21" y="25" width="4" height="3" fill="white" opacity="0.5"/>
        <rect x="26" y="20" width="6" height="8" fill="white" opacity="0.9"/>
      </svg>
      <span>Container Loading Planner</span>
    </a>

    <h1>Bentornato</h1>
    <p class="sub">Accedi per ritrovare i tuoi progetti.</p>

    <div id="msg"></div>

    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn primary" id="submitBtn">Accedi</button>
    </form>

    <p class="authAlt">
      Non hai un account? <a href="/signup.html">Registrati gratis</a>
    </p>
    <p class="authAlt" style="margin-top:8px">
      <a href="#" id="forgotLink">Ho dimenticato la password</a>
    </p>
  </div>
</div>

<script type="module">
import { supabase, currentUser } from "/lib/auth.js";

const u = await currentUser();
if (u) {
  const params = new URLSearchParams(location.search);
  location.href = params.get("redirect") || "/dashboard.html";
}

const form = document.getElementById("loginForm");
const msg  = document.getElementById("msg");
const btn  = document.getElementById("submitBtn");

function showMsg(text, kind="error") {
  msg.innerHTML = `<div class="authMessage ${kind}">${text}</div>`;
}

form.addEventListener("submit", async e => {
  e.preventDefault();
  btn.disabled = true; btn.textContent = "Accesso in corso…";
  msg.innerHTML = "";
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const { error } = await supabase.auth.signInWithPassword({ email, password });
  if (error) {
    showMsg(error.message === "Invalid login credentials"
      ? "Email o password non corrette."
      : "Errore: " + error.message);
    btn.disabled = false; btn.textContent = "Accedi";
    return;
  }
  const params = new URLSearchParams(location.search);
  location.href = params.get("redirect") || "/dashboard.html";
});

document.getElementById("forgotLink").addEventListener("click", async e => {
  e.preventDefault();
  const email = document.getElementById("email").value.trim();
  if (!email) { showMsg("Inserisci la tua email nel campo sopra, poi clicca di nuovo."); return; }
  const { error } = await supabase.auth.resetPasswordForEmail(email, {
    redirectTo: location.origin + "/reset-password.html"
  });
  if (error) showMsg("Errore: " + error.message);
  else showMsg("Ti abbiamo inviato un'email per reimpostare la password.", "success");
});
</script>
</body>
</html>
