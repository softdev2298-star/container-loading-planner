<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign in — Container Loading Planner</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/styles/site.css">
</head>
<body>

<div class="authWrap">
  <div class="authCard">
    <div style="display:flex;justify-content:flex-end;margin-bottom:8px"><span id="langSlot"></span></div>
    <a href="/" class="brand">
      <svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2" width="36" height="36" rx="6" fill="#0f172a"/>
      <rect x="7" y="11" width="26" height="18" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
      <rect x="9"  y="13" width="9"  height="6" fill="#fbbf24"/>
      <rect x="19" y="13" width="6"  height="6" fill="#fbbf24" opacity="0.85"/>
      <rect x="26" y="13" width="6"  height="6" fill="#fbbf24" opacity="0.7"/>
      <rect x="9"  y="20" width="6"  height="8" fill="#fbbf24" opacity="0.75"/>
      <rect x="16" y="20" width="9"  height="4" fill="#fbbf24" opacity="0.85"/>
      <rect x="16" y="25" width="4"  height="3" fill="#fbbf24" opacity="0.6"/>
      <rect x="21" y="25" width="4"  height="3" fill="#fbbf24" opacity="0.6"/>
      <rect x="26" y="20" width="6"  height="8" fill="#fbbf24" opacity="0.9"/>
    </svg>
      <span>Container Loading Planner</span>
    </a>

    <h1 data-i18n="auth.signin_title">Bentornato</h1>
    <p class="sub" data-i18n="auth.signin_sub">Accedi per ritrovare i tuoi progetti.</p>

    <div id="msg"></div>

    <form id="loginForm">
      <div class="field">
        <label for="email" data-i18n="common.email">Email</label>
        <input id="email" type="email" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password" data-i18n="common.password">Password</label>
        <input id="password" type="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn primary" id="submitBtn" data-i18n="auth.signin_btn">Accedi</button>
    </form>

    <p class="authAlt">
      <span data-i18n="auth.no_account">Non hai un account?</span> <a href="/signup.html" data-i18n="nav.signup">Registrati gratis</a>
    </p>
    <p class="authAlt" style="margin-top:8px">
      <a href="#" id="forgotLink" data-i18n="auth.forgot">Ho dimenticato la password</a>
    </p>
  </div>
</div>

<script type="module">
import { supabase, currentUser } from "/lib/auth.js";

const u = await currentUser();
if (u) {
  const params = new URLSearchParams(location.search);
  location.href = params.get("redirect") || "/dashboard.html";
}

const form = document.getElementById("loginForm");
const msg  = document.getElementById("msg");
const btn  = document.getElementById("submitBtn");

function showMsg(text, kind="error") {
  msg.innerHTML = `<div class="authMessage ${kind}">${text}</div>`;
}

form.addEventListener("submit", async e => {
  e.preventDefault();
  btn.disabled = true; btn.textContent = "Accesso in corso…";
  msg.innerHTML = "";
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const { error } = await supabase.auth.signInWithPassword({ email, password });
  if (error) {
    showMsg(error.message === "Invalid login credentials"
      ? "Email o password non corrette."
      : "Errore: " + error.message);
    btn.disabled = false; btn.textContent = "Accedi";
    return;
  }
  const params = new URLSearchParams(location.search);
  location.href = params.get("redirect") || "/dashboard.html";
});

document.getElementById("forgotLink").addEventListener("click", async e => {
  e.preventDefault();
  const email = document.getElementById("email").value.trim();
  if (!email) { showMsg("Inserisci la tua email nel campo sopra, poi clicca di nuovo."); return; }
  const { error } = await supabase.auth.resetPasswordForEmail(email, {
    redirectTo: location.origin + "/reset-password.html"
  });
  if (error) showMsg("Errore: " + error.message);
  else showMsg("Ti abbiamo inviato un'email per reimpostare la password.", "success");
});
</script>
</body>
</html>
