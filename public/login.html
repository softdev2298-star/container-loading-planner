<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Accedi — Container Loading Planner</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/styles/site.css">
</head>
<body>

<div class="authWrap">
  <div class="authCard">
    <a href="/" class="brand">
      <svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="36" height="36" rx="9" fill="#0f172a"/>
        <rect x="9"  y="22" width="8" height="9"  rx="1" fill="#fbbf24"/>
        <rect x="18" y="16" width="8" height="15" rx="1" fill="#fbbf24"/>
        <rect x="27" y="10" width="8" height="21" rx="1" fill="#fbbf24" opacity="0.55"/>
      </svg>
      <span>Container Loading Planner</span>
    </a>

    <h1>Bentornato</h1>
    <p class="sub">Accedi per ritrovare i tuoi progetti.</p>

    <div id="msg"></div>

    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn primary" id="submitBtn">Accedi</button>
    </form>

    <p class="authAlt">
      Non hai un account? <a href="/signup.html">Registrati gratis</a>
    </p>
    <p class="authAlt" style="margin-top:8px">
      <a href="#" id="forgotLink">Ho dimenticato la password</a>
    </p>
  </div>
</div>

<script type="module">
import { supabase, currentUser } from "/lib/auth.js";

// se già autenticato, redirect
const u = await currentUser();
if (u) {
  const params = new URLSearchParams(location.search);
  location.href = params.get("redirect") || "/dashboard.html";
}

const form = document.getElementById("loginForm");
const msg  = document.getElementById("msg");
const btn  = document.getElementById("submitBtn");

function showMsg(text, kind="error") {
  msg.innerHTML = `<div class="authMessage ${kind}">${text}</div>`;
}

form.addEventListener("submit", async e => {
  e.preventDefault();
  btn.disabled = true; btn.textContent = "Accesso in corso…";
  msg.innerHTML = "";
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const { error } = await supabase.auth.signInWithPassword({ email, password });
  if (error) {
    showMsg(error.message === "Invalid login credentials"
      ? "Email o password non corrette."
      : "Errore: " + error.message);
    btn.disabled = false; btn.textContent = "Accedi";
    return;
  }
  const params = new URLSearchParams(location.search);
  location.href = params.get("redirect") || "/dashboard.html";
});

document.getElementById("forgotLink").addEventListener("click", async e => {
  e.preventDefault();
  const email = document.getElementById("email").value.trim();
  if (!email) { showMsg("Inserisci la tua email nel campo sopra, poi clicca di nuovo.", "error"); return; }
  const { error } = await supabase.auth.resetPasswordForEmail(email, {
    redirectTo: location.origin + "/reset-password.html"
  });
  if (error) showMsg("Errore: " + error.message);
  else showMsg("Ti abbiamo inviato un'email per reimpostare la password.", "success");
});
</script>
</body>
</html>
